<!DOCTYPE html>
<html>
<head>
    <title>Enhanced Space Shooter</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 2px solid #444;
            box-shadow: 0 0 20px #1a1a1a;
            border-radius: 4px;
            background: black;
        }
        * { margin: 0; padding: 0; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        // Get canvas and context
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        canvas.width = 800;
        canvas.height = 600;

        // Game constants
        const PLAYER_SIZE = 40;
        const ENEMY_SIZE = 30;
        const BULLET_SIZE = 8;
        const SHOOT_COOLDOWN = 45; // Significantly increased cooldown time
        const SHOOT_COST = 20;    // Increased energy cost
        const MAX_ENERGY = 100;
        const ENERGY_REGEN = 0.4; // Slightly reduced energy regen

        // Initialize game state
        let gameState = {
            player: {
                x: canvas.width / 2,
                y: canvas.height / 2,
                speed: 5,
                health: 100,
                score: 0,
                bullets: [],
                dashCooldown: 0,
                shootCooldown: 0,
                energy: MAX_ENERGY,
                trail: []
            },
            enemies: [],
            currentWave: 1,
            wavesTotal: 5,
            enemiesPerWave: 10,
            enemiesDefeated: 0,
            waveComplete: false,
            gameOver: false,
            gameWon: false,
            keys: {},
            mousePos: { x: 0, y: 0 },
            mouseDown: false,
            particles: []
        };

        // Event Listeners
        document.addEventListener('keydown', (e) => gameState.keys[e.key.toLowerCase()] = true);
        document.addEventListener('keyup', (e) => gameState.keys[e.key.toLowerCase()] = false);
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            gameState.mousePos.x = e.clientX - rect.left;
            gameState.mousePos.y = e.clientY - rect.top;
        });
        canvas.addEventListener('mousedown', () => gameState.mouseDown = true);
        canvas.addEventListener('mouseup', () => gameState.mouseDown = false);

        function createParticle(x, y, color, speed, size, lifetime) {
            const angle = Math.random() * Math.PI * 2;
            return {
                x,
                y,
                dx: Math.cos(angle) * speed * (0.5 + Math.random()),
                dy: Math.sin(angle) * speed * (0.5 + Math.random()),
                size: size * (0.5 + Math.random()),
                color,
                lifetime: lifetime * (0.8 + Math.random() * 0.4),
                alpha: 1
            };
        }

        function spawnEnemy() {
            const side = Math.floor(Math.random() * 4);
            let x, y;
            
            switch(side) {
                case 0: x = Math.random() * canvas.width; y = -ENEMY_SIZE; break;
                case 1: x = canvas.width + ENEMY_SIZE; y = Math.random() * canvas.height; break;
                case 2: x = Math.random() * canvas.width; y = canvas.height + ENEMY_SIZE; break;
                case 3: x = -ENEMY_SIZE; y = Math.random() * canvas.height; break;
            }

            return {
                x,
                y,
                speed: 2 + (gameState.currentWave - 1) * 0.5,
                health: 100 + (gameState.currentWave - 1) * 20
            };
        }

        function createBullet(startX, startY, targetX, targetY) {
            const angle = Math.atan2(targetY - startY, targetX - startX);
            const speed = 10;
            return {
                x: startX,
                y: startY,
                dx: Math.cos(angle) * speed,
                dy: Math.sin(angle) * speed,
                lifetime: 60
            };
        }

        function updateGame() {
            const player = gameState.player;

            // Player movement
            if (gameState.keys['w']) player.y -= player.speed;
            if (gameState.keys['s']) player.y += player.speed;
            if (gameState.keys['a']) player.x -= player.speed;
            if (gameState.keys['d']) player.x += player.speed;

            // Keep player in bounds
            player.x = Math.max(PLAYER_SIZE, Math.min(canvas.width - PLAYER_SIZE, player.x));
            player.y = Math.max(PLAYER_SIZE, Math.min(canvas.height - PLAYER_SIZE, player.y));

            // Update cooldowns and energy
            if (player.dashCooldown > 0) player.dashCooldown--;
            if (player.shootCooldown > 0) player.shootCooldown--;
            player.energy = Math.min(MAX_ENERGY, player.energy + ENERGY_REGEN);

            // Dash with particles
            if (gameState.keys[' '] && player.dashCooldown === 0) {
                const dashDistance = 100;
                const dx = (gameState.keys['d'] - gameState.keys['a']);
                const dy = (gameState.keys['s'] - gameState.keys['w']);
                if (dx !== 0 || dy !== 0) {
                    const length = Math.sqrt(dx * dx + dy * dy);
                    player.x += (dx / length) * dashDistance;
                    player.y += (dy / length) * dashDistance;
                    player.dashCooldown = 30;
                    
                    // Add dash particles
                    for (let i = 0; i < 20; i++) {
                        gameState.particles.push(createParticle(
                            player.x, player.y,
                            'rgba(100, 100, 255, 0.8)',
                            3, 5, 30
                        ));
                    }
                }
            }

            // Shooting with cooldown and energy
            if (gameState.mouseDown) {
                if (player.shootCooldown <= 0 && player.energy >= SHOOT_COST) {
                    // Create bullet
                    player.bullets.push(createBullet(player.x, player.y, 
                                                   gameState.mousePos.x, gameState.mousePos.y));
                    // Reset cooldown
                    player.shootCooldown = SHOOT_COOLDOWN;
                    // Consume energy
                    player.energy -= SHOOT_COST;
                    
                    // Add muzzle flash particles
                    for (let i = 0; i < 5; i++) {
                        gameState.particles.push(createParticle(
                            player.x, player.y,
                            'rgba(255, 255, 100, 0.8)',
                            2, 3, 15
                        ));
                    }
                }
            }

            // Update particles
            gameState.particles = gameState.particles.filter(particle => {
                particle.x += particle.dx;
                particle.y += particle.dy;
                particle.lifetime--;
                particle.alpha = particle.lifetime / 30;
                return particle.lifetime > 0;
            });

            // Update bullets
            player.bullets = player.bullets.filter(bullet => {
                bullet.x += bullet.dx;
                bullet.y += bullet.dy;
                bullet.lifetime--;
                
                // Add bullet trail particles
                if (Math.random() < 0.3) {
                    gameState.particles.push(createParticle(
                        bullet.x, bullet.y,
                        'rgba(255, 255, 0, 0.5)',
                        1, 2, 20
                    ));
                }
                
                return bullet.lifetime > 0;
            });

            // Spawn enemies
            if (!gameState.waveComplete && gameState.enemies.length < 3 && 
                gameState.enemiesDefeated < gameState.enemiesPerWave) {
                if (Math.random() < 0.02) {
                    gameState.enemies.push(spawnEnemy());
                }
            }

            // Update enemies
            gameState.enemies = gameState.enemies.filter((enemy, i) => {
                const dx = player.x - enemy.x;
                const dy = player.y - enemy.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                enemy.x += (dx / dist) * enemy.speed;
                enemy.y += (dy / dist) * enemy.speed;

                // Enemy trail particles
                if (Math.random() < 0.2) {
                    gameState.particles.push(createParticle(
                        enemy.x, enemy.y,
                        'rgba(255, 50, 50, 0.5)',
                        1, 3, 20
                    ));
                }

                // Check collision with player
                if (dist < (PLAYER_SIZE + ENEMY_SIZE) / 2) {
                    player.health -= 10;
                    
                    // Collision particles
                    for (let i = 0; i < 15; i++) {
                        gameState.particles.push(createParticle(
                            enemy.x, enemy.y,
                            'rgba(255, 100, 100, 0.8)',
                            3, 4, 25
                        ));
                    }
                    
                    if (player.health <= 0) {
                        gameState.gameOver = true;
                    }
                    return false;
                }

                // Check collision with bullets
                for (let j = player.bullets.length - 1; j >= 0; j--) {
                    const bullet = player.bullets[j];
                    const bulletDist = Math.sqrt(
                        Math.pow(bullet.x - enemy.x, 2) + 
                        Math.pow(bullet.y - enemy.y, 2)
                    );
                    
                    if (bulletDist < (BULLET_SIZE + ENEMY_SIZE) / 2) {
                        player.bullets.splice(j, 1);
                        player.score += 100 * gameState.currentWave;
                        gameState.enemiesDefeated++;
                        
                        // Explosion particles
                        for (let i = 0; i < 20; i++) {
                            gameState.particles.push(createParticle(
                                enemy.x, enemy.y,
                                'rgba(255, 150, 50, 0.8)',
                                4, 5, 30
                            ));
                        }
                        
                        if (gameState.enemiesDefeated >= gameState.enemiesPerWave) {
                            gameState.waveComplete = true;
                            if (gameState.currentWave >= gameState.wavesTotal) {
                                gameState.gameWon = true;
                            } else {
                                setTimeout(startNextWave, 3000);
                            }
                        }
                        return false;
                    }
                }
                return true;
            });

            // Update trail
            player.trail.push({x: player.x, y: player.y});
            if (player.trail.length > 10) player.trail.shift();
        }

        function startNextWave() {
            gameState.currentWave++;
            gameState.enemiesDefeated = 0;
            gameState.waveComplete = false;
            gameState.enemies = [];
            gameState.player.health = Math.min(100, gameState.player.health + 30);
        }

        function drawGame() {
            // Clear canvas
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw particles
            gameState.particles.forEach(particle => {
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                ctx.fillStyle = particle.color.replace(')', `, ${particle.alpha})`);
                ctx.fill();
            });

            // Draw player trail
            gameState.player.trail.forEach((pos, i) => {
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, PLAYER_SIZE/2, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(
                    pos.x, pos.y, 0,
                    pos.x, pos.y, PLAYER_SIZE/2
                );
                gradient.addColorStop(0, `rgba(50, 50, 255, ${i / gameState.player.trail.length * 0.3})`);
                gradient.addColorStop(1, 'rgba(50, 50, 255, 0)');
                ctx.fillStyle = gradient;
                ctx.fill();
            });

            // Draw player
            ctx.beginPath();
            ctx.arc(gameState.player.x, gameState.player.y, PLAYER_SIZE/2, 0, Math.PI * 2);
            const playerGradient = ctx.createRadialGradient(
                gameState.player.x, gameState.player.y, 0,
                gameState.player.x, gameState.player.y, PLAYER_SIZE/2
            );
            playerGradient.addColorStop(0, 'rgb(150, 150, 255)');
            playerGradient.addColorStop(1, 'rgb(50, 50, 255)');
            ctx.fillStyle = playerGradient;
            ctx.fill();

            // Draw enemies
            gameState.enemies.forEach(enemy => {
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, ENEMY_SIZE/2, 0, Math.PI * 2);
                const enemyGradient = ctx.createRadialGradient(
                    enemy.x, enemy.y, 0,
                    enemy.x, enemy.y, ENEMY_SIZE/2
                );
                enemyGradient.addColorStop(0, 'rgb(255, 150, 150)');
                enemyGradient.addColorStop(1, 'rgb(255, 50, 50)');
                ctx.fillStyle = enemyGradient;
                ctx.fill();
            });

            // Draw bullets
            gameState.player.bullets.forEach(bullet => {
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, BULLET_SIZE/2, 0, Math.PI * 2);
                ctx.fillStyle = 'yellow';
                ctx.fill();
            });

            // Draw UI
            // Health bar
            ctx.fillStyle = 'rgba(50, 50, 50, 0.5)';
            ctx.fillRect(10, 10, 200, 20);
            ctx.fillStyle = `rgb(${255 - gameState.player.health * 2}, ${gameState.player.health * 2}, 50)`;
            ctx.fillRect(10, 10, 200 * (gameState.player.health / 100), 20);

            // Energy bar
            ctx.fillStyle = 'rgba(50, 50, 50, 0.5)';
            ctx.fillRect(10, 40, 200, 20);
            ctx.fillStyle = `rgb(50, 150, ${gameState.player.energy * 2.55})`;
            ctx.fillRect(10, 40, 200 * (gameState.player.energy / MAX_ENERGY), 20);

            // Stats
            ctx.fillStyle = 'white';
            ctx.font = '20px Arial';
            ctx.fillText(`Score: ${gameState.player.score}`, 10, 80);
            ctx.fillText(`Wave: ${gameState.currentWave}/${gameState.wavesTotal}`, 10, 110);
            ctx.fillText(`Enemies: ${gameState.enemiesDefeated}/${gameState.enemiesPerWave}`, 10, 140);

            // Game state messages
            if (gameState.waveComplete && !gameState.gameWon) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`Wave ${gameState.currentWave} Complete!`, canvas.width/2, canvas.height/2);
                ctx.font = '20px Arial';
                ctx.fillText('Next wave incoming...', canvas.width/2, canvas.height/2 + 40);
                ctx.textAlign = 'left';
            }

            if (gameState.gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'red';
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Game Over!', canvas.width/2, canvas.height/2);
                ctx.fillStyle = 'white';
                ctx.font = '20px Arial';
                ctx.fillText(`Final Score: ${gameState.player.score}`, canvas.width/2, canvas.height/2 + 40);
                ctx.fillText('Press R to restart', canvas.width/2, canvas.height/2 + 80);
                ctx.textAlign = 'left';
            }

            if (gameState.gameWon) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'gold';
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Victory!', canvas.width/2, canvas.height/2);
                ctx.fillStyle = 'white';
                ctx.font = '20px Arial';
                ctx.fillText(`Final Score: ${gameState.player.score}`, canvas.width/2, canvas.height/2 + 40);
                ctx.fillText('Press R to play again', canvas.width/2, canvas.height/2 + 80);
                ctx.textAlign = 'left';
            }
        }

        function resetGame() {
            gameState = {
                player: {
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    speed: 5,
                    health: 100,
                    score: 0,
                    bullets: [],
                    dashCooldown: 0,
                    shootCooldown: 0,
                    energy: MAX_ENERGY,
                    trail: []
                },
                enemies: [],
                currentWave: 1,
                wavesTotal: 5,
                enemiesPerWave: 10,
                enemiesDefeated: 0,
                waveComplete: false,
                gameOver: false,
                gameWon: false,
                keys: gameState.keys,
                mousePos: gameState.mousePos,
                mouseDown: gameState.mouseDown,
                particles: []
            };
        }

        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r' && (gameState.gameOver || gameState.gameWon)) {
                resetGame();
            }
        });

        function gameLoop() {
            if (!gameState.gameOver && !gameState.gameWon) {
                updateGame();
            }
            drawGame();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
