            document.getElementById('waveSelectMenu').style.display = 'none';
            
            // Close upgrade menu if open
            closeUpgradeMenu();
            
            // Clear any potentially stuck keys
            resetKeyboardState();
        }
        
        // Helper function to reset keyboard state
        function resetKeyboardState() {
            gameState.keys = {};
            gameState.lastKeyPress = {};
        }

        function explodeBomber(bomber) {
            // Create large explosion
            const explosionRadius = 100;
            
            // Visual effect - big explosion
            for (let i = 0; i < 40; i++) {
                gameState.particles.push(createParticle(
                    bomber.x, bomber.y,
                    COLORS.ENEMY.BOMBER.CORE,
                    5 + Math.random() * 3,
                    4 + Math.random() * 4,
                    50,
                    true
                ));
            }
            
            // Check if player is caught in explosion
            const dx = gameState.player.x - bomber.x;
            const dy = gameState.player.y - bomber.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < explosionRadius + CONSTANTS.PLAYER.BASE_SIZE) {
                // Calculate damage based on distance from center (more damage closer to center)
                const damageFactor = 1 - (dist / (explosionRadius + CONSTANTS.PLAYER.BASE_SIZE));
                const damage = Math.round(30 * damageFactor);
                
                // If shield is active, reduce shield instead of health
                if (gameState.player.shield > 0) {
                    gameState.player.shield -= damage * 2;
                    if (gameState.player.shield < 0) gameState.player.shield = 0;
                } else {
                    gameState.player.health -= damage;
                    
                    // Check for game over
                    if (gameState.player.health <= 0) {
                        gameState.gameOver = true;
                    }
                }
                
                // Knockback effect
                const knockbackForce = 10 * damageFactor;
                const knockbackAngle = Math.atan2(dy, dx);
                gameState.player.x += Math.cos(knockbackAngle) * knockbackForce;
                gameState.player.y += Math.sin(knockbackAngle) * knockbackForce;
            }
            
            // Create shockwave effect
            const shockwave = {
                x: bomber.x,
                y: bomber.y,
                radius: 10,
                maxRadius: explosionRadius,
                lifetime: 20,
                color: COLORS.ENEMY.BOMBER.GLOW
            };
            
            gameState.shockwaves = gameState.shockwaves || [];
            gameState.shockwaves.push(shockwave);
        }
        
        function createTeleportEffect(x, y) {
            // Visual effect for teleportation
            for (let i = 0; i < 20; i++) {
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 30;
                
                gameState.particles.push({
                    x: x + Math.cos(angle) * distance,
                    y: y + Math.sin(angle) * distance,
                    dx: Math.cos(angle) * 2,
                    dy: Math.sin(angle) * 2,
                    size: 3 + Math.random() * 2,
                    color: COLORS.ENEMY.ELITE.CORE,
                    lifetime: 20,
                    alpha: 1,
                    glow: true
                });
            }
        }

        function updateObstacles() {
            // Update existing obstacles
            gameState.obstacles = gameState.obstacles.filter(obstacle => {
                obstacle.lifetime--;
                if (obstacle.lifetime <= 0) {
                    // Create fade out effect
                    createExplosion(obstacle.x, obstacle.y, COLORS.OBSTACLES[obstacle.type].CORE);
                    return false;
                }
                return true;
            });

            // Spawn new obstacles if below max count
            if (gameState.obstacles.length < CONSTANTS.OBSTACLES.MAX_COUNT) {
                if (Math.random() < CONSTANTS.OBSTACLES.SPAWN_CHANCE) {
                    const obstacleType = CONSTANTS.OBSTACLES.TYPES[Math.floor(Math.random() * CONSTANTS.OBSTACLES.TYPES.length)];
                    // Randomly choose between horizontal and vertical orientation
                    const isHorizontal = Math.random() < 0.5;
                    gameState.obstacles.push({
                        x: Math.random() * (canvas.width - (isHorizontal ? CONSTANTS.OBSTACLES.SIZE : CONSTANTS.OBSTACLES.THICKNESS)) + (isHorizontal ? CONSTANTS.OBSTACLES.SIZE/2 : CONSTANTS.OBSTACLES.THICKNESS/2),
                        y: Math.random() * (canvas.height - (isHorizontal ? CONSTANTS.OBSTACLES.THICKNESS : CONSTANTS.OBSTACLES.SIZE)) + (isHorizontal ? CONSTANTS.OBSTACLES.THICKNESS/2 : CONSTANTS.OBSTACLES.SIZE/2),
                        type: obstacleType,
                        isHorizontal: isHorizontal,
                        rotation: isHorizontal ? 0 : Math.PI/2,
                        lifetime: CONSTANTS.OBSTACLES.LIFETIME
                    });
                }
            }

            // Check for collisions with player and enemies
            gameState.obstacles.forEach(obstacle => {
                // Check player collision
                const playerDx = gameState.player.x - obstacle.x;
                const playerDy = gameState.player.y - obstacle.y;
                const playerDist = Math.sqrt(playerDx * playerDx + playerDy * playerDy);

                if (checkWallCollision(gameState.player, obstacle, CONSTANTS.PLAYER.BASE_SIZE)) {
                    // Push player away from the wall
                    const angle = Math.atan2(playerDy, playerDx);
                    const pushDistance = CONSTANTS.PLAYER.BASE_SIZE + (obstacle.isHorizontal ? CONSTANTS.OBSTACLES.THICKNESS/2 : CONSTANTS.OBSTACLES.SIZE/2) - playerDist;
                    gameState.player.x += Math.cos(angle) * pushDistance;
                    gameState.player.y += Math.sin(angle) * pushDistance;
                }

                // Check enemy collisions
                gameState.enemies.forEach(enemy => {
                    if (checkWallCollision(enemy, obstacle, enemy.size)) {
                        // Push enemy away from the wall
                        const enemyDx = enemy.x - obstacle.x;
                        const enemyDy = enemy.y - obstacle.y;
                        const enemyDist = Math.sqrt(enemyDx * enemyDx + enemyDy * enemyDy);
                        const angle = Math.atan2(enemyDy, enemyDx);
                        const pushDistance = enemy.size + (obstacle.isHorizontal ? CONSTANTS.OBSTACLES.THICKNESS/2 : CONSTANTS.OBSTACLES.SIZE/2) - enemyDist;
                        enemy.x += Math.cos(angle) * pushDistance;
                        enemy.y += Math.sin(angle) * pushDistance;
                    }
                });
            });
        }

        // Helper function to check wall collision
        function checkWallCollision(entity, wall, entitySize) {
            const dx = entity.x - wall.x;
            const dy = entity.y - wall.y;
            
            if (wall.isHorizontal) {
                // Check horizontal wall collision
                return Math.abs(dy) < entitySize + CONSTANTS.OBSTACLES.THICKNESS/2 &&
                       Math.abs(dx) < CONSTANTS.OBSTACLES.SIZE/2;
            } else {
                // Check vertical wall collision
                return Math.abs(dx) < entitySize + CONSTANTS.OBSTACLES.THICKNESS/2 &&
                       Math.abs(dy) < CONSTANTS.OBSTACLES.SIZE/2;
            }
        }

        function drawObstacles() {
            gameState.obstacles.forEach(obstacle => {
                // Calculate fade out effect
                const fadeOut = obstacle.lifetime / CONSTANTS.OBSTACLES.LIFETIME;
                
                // Draw glow effect with fade
                drawGlow(obstacle.x, obstacle.y, 
                        obstacle.isHorizontal ? CONSTANTS.OBSTACLES.SIZE/2 : CONSTANTS.OBSTACLES.THICKNESS/2,
                        COLORS.OBSTACLES[obstacle.type].GLOW.replace(')', `, ${0.3 * fadeOut})`));

                // Draw obstacle
                ctx.save();
                ctx.translate(obstacle.x, obstacle.y);
                ctx.rotate(obstacle.rotation);
                ctx.globalAlpha = fadeOut;

                switch(obstacle.type) {
                    case 'WALL':
                        // Draw solid wall with pattern
                        ctx.beginPath();
                        ctx.rect(-CONSTANTS.OBSTACLES.SIZE/2, -CONSTANTS.OBSTACLES.THICKNESS/2, 
                                CONSTANTS.OBSTACLES.SIZE, CONSTANTS.OBSTACLES.THICKNESS);
                        ctx.fillStyle = COLORS.OBSTACLES.WALL.CORE;
                        ctx.fill();
                        // Add wall pattern
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                        ctx.lineWidth = 2;
                        for (let i = -CONSTANTS.OBSTACLES.SIZE/2; i <= CONSTANTS.OBSTACLES.SIZE/2; i += 20) {
                            ctx.beginPath();
                            ctx.moveTo(i, -CONSTANTS.OBSTACLES.THICKNESS/2);
                            ctx.lineTo(i, CONSTANTS.OBSTACLES.THICKNESS/2);
                            ctx.stroke();
                        }
                        break;

                    case 'CRYSTAL_WALL':
                        // Draw crystal wall with facets
                        ctx.beginPath();
                        ctx.rect(-CONSTANTS.OBSTACLES.SIZE/2, -CONSTANTS.OBSTACLES.THICKNESS/2, 
                                CONSTANTS.OBSTACLES.SIZE, CONSTANTS.OBSTACLES.THICKNESS);
                        ctx.fillStyle = COLORS.OBSTACLES.CRYSTAL_WALL.CORE;
                        ctx.fill();
                        // Add crystal facets
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                        ctx.lineWidth = 2;
                        for (let i = 0; i < 8; i++) {
                            const angle = (i / 8) * Math.PI * 2;
                            ctx.beginPath();
                            ctx.moveTo(0, 0);
                            ctx.lineTo(
                                Math.cos(angle) * CONSTANTS.OBSTACLES.SIZE/2,
                                Math.sin(angle) * CONSTANTS.OBSTACLES.THICKNESS/2
                            );
                            ctx.stroke();
                        }
                        break;

                    case 'BARRIER_WALL':
                        // Draw barrier wall with warning stripes
                        ctx.beginPath();
                        ctx.rect(-CONSTANTS.OBSTACLES.SIZE/2, -CONSTANTS.OBSTACLES.THICKNESS/2, 
                                CONSTANTS.OBSTACLES.SIZE, CONSTANTS.OBSTACLES.THICKNESS);
                        ctx.fillStyle = COLORS.OBSTACLES.BARRIER_WALL.CORE;
                        ctx.fill();
                        // Add warning stripes
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                        ctx.lineWidth = 4;
                        for (let i = -CONSTANTS.OBSTACLES.SIZE/2; i <= CONSTANTS.OBSTACLES.SIZE/2; i += 30) {
                            ctx.beginPath();
                            ctx.moveTo(i, -CONSTANTS.OBSTACLES.THICKNESS/2);
                            ctx.lineTo(i, CONSTANTS.OBSTACLES.THICKNESS/2);
                            ctx.stroke();
                        }
                        break;
                }

                ctx.restore();
            });
        }

        // Drawing functions
        function draw() {
            // Clear canvas with a complete black fill instead of partial transparency 
            // to prevent slowdown from too many accumulated transparency layers
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw starfield
            drawStars();

            // Draw game elements
            drawParticles();
            drawShockwaves();
            drawObstacles();
            drawPowerUps();
            drawEnemies();
            drawBullets();
            drawPlayer();
            drawUI();

            // Draw game state messages
            if (gameState.gameOver) {
                drawGameOver();
            } else if (gameState.gameWon) {
                drawVictory();
            }
        }

        function drawStars() {
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
                
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.speed})`;
                ctx.fill();
            });
        }

        function drawParticles() {
            // Safety check for particles (prevent error)
            if (!gameState.particles || !Array.isArray(gameState.particles)) {
                gameState.particles = [];
                return;
            }
            
            // Draw batch of particles instead of individually
            const simpleParticles = [];
            const glowParticles = [];
            
            // Split particles into glow and simple for batch processing
            gameState.particles.forEach(particle => {
                if (particle && particle.glow) {
                    glowParticles.push(particle);
                } else if (particle) {
                    simpleParticles.push(particle);
                }
            });
            
            // Draw glow particles (these are more expensive)
            glowParticles.forEach(particle => {
                try {
                    // Skip invalid particles
                    if (!particle || typeof particle.color !== 'string') return;
                    
                    // Apply reduced effects if needed
                    if (reducedEffects && Math.random() > 0.5) return;
                    
                    // Safely replace color with alpha
                    let colorWithAlpha;
                    try {
                        colorWithAlpha = particle.color.replace(')', `, ${particle.alpha * 0.5})`);
                    } catch (e) {
                        colorWithAlpha = 'rgba(255,255,255,0.5)';
                    }
                    
                    drawGlow(particle.x, particle.y, particle.size * 2, colorWithAlpha);
                    
                    ctx.beginPath();
                    ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                    ctx.fillStyle = particle.color.replace(')', `, ${particle.alpha})`);
                    ctx.fill();
                } catch (e) {
                    // Silently ignore drawing errors for individual particles
                    console.log("Particle draw error:", e);
                }
            });
            
            // Draw simple particles in batches for better performance
            if (simpleParticles.length > 0) {
                try {
                    ctx.beginPath();
                    simpleParticles.forEach(particle => {
                        if (!particle) return;
                        ctx.moveTo(particle.x, particle.y);
                        ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                    });
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                    ctx.fill();
                } catch (e) {
                    // Skip batch if there's an error
                    console.log("Simple particles batch error:", e);
                }
            }
        }

        function drawShockwaves() {
            if (!gameState.shockwaves || gameState.shockwaves.length === 0) return;
            
            gameState.shockwaves.forEach(shockwave => {
                const alpha = shockwave.lifetime / 20;
                ctx.beginPath();
                ctx.arc(shockwave.x, shockwave.y, shockwave.radius, 0, Math.PI * 2);
                ctx.strokeStyle = shockwave.color.replace(')', `, ${alpha})`);
                ctx.lineWidth = 3;
                ctx.stroke();
            });
        }

        function drawPowerUps() {
            gameState.powerUps.forEach(powerUp => {
                // Create a mapping between power-up types and color keys
                let colorKey;
                switch(powerUp.type) {
                    case 'shield': colorKey = 'SHIELD'; break;
                    case 'multiShot': colorKey = 'MULTI_SHOT'; break;
                    case 'speedBoost': colorKey = 'SPEED_BOOST'; break;
                    case 'rapidFire': colorKey = 'RAPID_FIRE'; break;
                    case 'healthRestore': colorKey = 'HEALTH_RESTORE'; break;
                    case 'timeWarp': colorKey = 'TIME_WARP'; break;
                    default: colorKey = 'SHIELD'; // Fallback color
                }
                
                // Larger glow effect for better visibility
                drawGlow(powerUp.x, powerUp.y, 40, 
                        COLORS.POWER_UPS[colorKey].replace(')', ', 0.5)'));
                
                // Larger power-up size
                const powerUpSize = 20;
                ctx.beginPath();
                ctx.arc(powerUp.x, powerUp.y, powerUpSize, 0, Math.PI * 2);
                ctx.fillStyle = COLORS.POWER_UPS[colorKey];
                ctx.fill();
                
                // Brighter outline
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // Add pulsing animation for better visibility
                const pulseSize = powerUpSize * (1 + 0.2 * Math.sin(Date.now() / 200));
                ctx.beginPath();
                ctx.arc(powerUp.x, powerUp.y, pulseSize, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
        }

        function drawPlayer() {
            const player = gameState.player;

            // Draw trail
            player.trail.forEach((pos, i) => {
                const alpha = i / player.trail.length;
                drawGlow(pos.x, pos.y, 20, `rgba(88, 161, 247, ${alpha * 0.2})`);
            });

            // Draw shield if active
            if (player.shield > 0) {
                drawGlow(player.x, player.y, CONSTANTS.PLAYER.BASE_SIZE + 20, 
                        `rgba(88, 161, 247, ${player.shield / 200})`);
                
                ctx.beginPath();
                ctx.arc(player.x, player.y, CONSTANTS.PLAYER.BASE_SIZE + 10, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(88, 161, 247, ${player.shield / 100})`;
                ctx.lineWidth = 3;
                ctx.stroke();
            }

            // Draw player
            drawGlow(player.x, player.y, CONSTANTS.PLAYER.BASE_SIZE, 
                    COLORS.PLAYER.GLOW.replace(')', ', 0.5)'));
            
            ctx.beginPath();
            ctx.arc(player.x, player.y, CONSTANTS.PLAYER.BASE_SIZE/2, 0, Math.PI * 2);
            const gradient = ctx.createRadialGradient(
                player.x, player.y, 0,
                player.x, player.y, CONSTANTS.PLAYER.BASE_SIZE/2
            );
            gradient.addColorStop(0, COLORS.PLAYER.CORE);
            gradient.addColorStop(1, COLORS.PLAYER.GLOW);
            ctx.fillStyle = gradient;
            ctx.fill();
        }

        function drawBullets() {
            gameState.player.bullets.forEach(bullet => {
                drawGlow(bullet.x, bullet.y, CONSTANTS.BULLET.SIZE * 2, 
                        COLORS.BULLET.GLOW.replace(')', ', 0.3)'));
                
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, CONSTANTS.BULLET.SIZE/2, 0, Math.PI * 2);
                ctx.fillStyle = COLORS.BULLET.CORE;
                ctx.fill();
            });
        }

        function drawEnemies() {
            gameState.enemies.forEach(enemy => {
                // Special rendering for bomber when flashing
                if (enemy.type === 'BOMBER' && enemy.flashColor) {
                    drawGlow(enemy.x, enemy.y, enemy.size + 15, 
                            'rgba(255, 255, 255, 0.5)');
                } else {
                    drawGlow(enemy.x, enemy.y, enemy.size + 10, 
                            COLORS.ENEMY[enemy.type].GLOW.replace(')', ', 0.3)'));
                }
                
                // Draw elite shield if applicable
                if (enemy.type === 'ELITE' && enemy.shield > 0) {
                    ctx.beginPath();
                    ctx.arc(enemy.x, enemy.y, enemy.size + 5, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255, 215, 0, ${enemy.shield / 100})`;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
                
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.size, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(
                    enemy.x, enemy.y, 0,
                    enemy.x, enemy.y, enemy.size
                );
                gradient.addColorStop(0, COLORS.ENEMY[enemy.type].CORE);
                gradient.addColorStop(1, COLORS.ENEMY[enemy.type].GLOW);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Health bar
                const healthWidth = enemy.size * 2;
                const healthHeight = 4;
                const healthX = enemy.x - healthWidth/2;
                const healthY = enemy.y - enemy.size - 10;

                ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
                ctx.fillRect(healthX, healthY, healthWidth, healthHeight);
                ctx.fillStyle = 'rgba(0, 255, 0, 0.7)';
                ctx.fillRect(healthX, healthY, healthWidth * (enemy.health / enemy.maxHealth), healthHeight);
            });
            
            // Draw enemy bullets if they exist
            if (gameState.enemyBullets) {
                gameState.enemyBullets.forEach(bullet => {
                    // Different bullet appearances based on enemy type
                    if (bullet.fromElite) {
                        drawGlow(bullet.x, bullet.y, CONSTANTS.BULLET.SIZE * 2, 
                                'rgba(255, 215, 0, 0.3)');
                        
                        ctx.beginPath();
                        ctx.arc(bullet.x, bullet.y, CONSTANTS.BULLET.SIZE/2, 0, Math.PI * 2);
                        ctx.fillStyle = '#FFD700';
                        ctx.fill();
                    } else if (bullet.fromShooter) {
                        drawGlow(bullet.x, bullet.y, CONSTANTS.BULLET.SIZE * 2, 
                                'rgba(147, 112, 219, 0.3)');
                        
                        ctx.beginPath();
                        ctx.arc(bullet.x, bullet.y, CONSTANTS.BULLET.SIZE/2, 0, Math.PI * 2);
                        ctx.fillStyle = '#9370DB';
                        ctx.fill();
                    } else {
                        drawGlow(bullet.x, bullet.y, CONSTANTS.BULLET.SIZE * 2, 
                                'rgba(255, 0, 0, 0.3)');
                        
                        ctx.beginPath();
                        ctx.arc(bullet.x, bullet.y, CONSTANTS.BULLET.SIZE/2, 0, Math.PI * 2);
                        ctx.fillStyle = '#FF4040';
                        ctx.fill();
                    }
                });
            }
            }

        function drawUI() {
            // Health bar
            const healthWidth = 200;
            const healthHeight = 20;
            drawBar(10, 10, healthWidth, healthHeight, 
                   gameState.player.health / gameState.player.maxHealth,
                   'rgba(255, 50, 50, 0.8)', 'rgba(255, 0, 0, 0.3)');
                   
            // Show health restored indicator
            if (gameState.healthRestoredTime > 0) {
                // Fade out towards the end
                const alpha = Math.min(1, gameState.healthRestoredTime / 60);
                ctx.fillStyle = `rgba(255, 105, 180, ${alpha})`;
                ctx.font = '18px "Segoe UI"';
                
                // Add animation - float upward and fade
                const yOffset = (120 - gameState.healthRestoredTime) * 0.3;
                ctx.fillText(`+${Math.round(gameState.player.maxHealth * 0.3)} Health!`, 215, 25 - yOffset);
                
                // Add glow effect around health bar when healing
                if (gameState.healthRestoredTime > 90) {
                    ctx.beginPath();
                    ctx.rect(9, 9, healthWidth + 2, healthHeight + 2);
                    ctx.strokeStyle = `rgba(255, 105, 180, ${alpha})`;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
            }

            // Energy bar
            drawBar(10, 40, healthWidth, healthHeight,
                   gameState.player.energy / gameState.player.maxEnergy,
                   'rgba(50, 150, 255, 0.8)', 'rgba(0, 100, 255, 0.3)');

            // Score and wave info
            ctx.fillStyle = 'white';
            ctx.font = '20px "Segoe UI"';
            ctx.fillText(`Score: ${gameState.player.score}`, 10, 80);
            ctx.fillText(`Wave: ${gameState.currentWave}/${gameState.wavesTotal}`, 10, 110);
            ctx.fillText(`Enemies: ${gameState.enemiesDefeated}/${gameState.enemiesPerWave}`, 10, 140);
            
            // Debug info - show number of active power-ups
            ctx.fillText(`Active Power-ups: ${gameState.powerUps.length}`, 10, 170);
            
            // Active Power-ups Display
            let powerUpY = 200; // Moved down to make room for debug text
            const iconSize = 30;
            
            // Shield
            if (gameState.player.shield > 0) {
                ctx.fillStyle = COLORS.POWER_UPS.SHIELD;
                ctx.beginPath();
                ctx.arc(25, powerUpY, iconSize/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.fillText('Shield', 50, powerUpY + 7);
                powerUpY += 40;
            }
            
            // Multi-shot
            if (gameState.player.multiShot) {
                ctx.fillStyle = COLORS.POWER_UPS.MULTI_SHOT;
                ctx.beginPath();
                ctx.arc(25, powerUpY, iconSize/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.fillText('Multi-shot', 50, powerUpY + 7);
                powerUpY += 40;
            }
            
            // Rapid Fire
            if (gameState.player.rapidFire) {
                ctx.fillStyle = COLORS.POWER_UPS.RAPID_FIRE;
                ctx.beginPath();
                ctx.arc(25, powerUpY, iconSize/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.fillText('Rapid Fire', 50, powerUpY + 7);
                powerUpY += 40;
            }
            
            // Speed Boost
            if (gameState.player.speedBoostActive) {
                ctx.fillStyle = COLORS.POWER_UPS.SPEED_BOOST;
                ctx.beginPath();
                ctx.arc(25, powerUpY, iconSize/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.fillText('Speed Boost', 50, powerUpY +7);
                powerUpY += 40;
            }
            
            // Time Warp
            if (gameState.timeWarpActive) {
                ctx.fillStyle = COLORS.POWER_UPS.TIME_WARP;
                ctx.beginPath();
                ctx.arc(25, powerUpY, iconSize/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.fillText('Time Warp', 50, powerUpY + 7);
                powerUpY += 40;
            }
        }

        function drawBar(x, y, width, height, fillPercent, fillColor, backgroundColor) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(x, y, width, height);
            ctx.fillStyle = backgroundColor;
            ctx.fillRect(x, y, width * fillPercent, height);
            ctx.fillStyle = fillColor;
            ctx.fillRect(x, y, width * fillPercent, height * 0.8);
        }

        function drawGameOver() {
            drawEndScreen('Game Over', 'red');
        }

        function drawVictory() {
            drawEndScreen('Victory!', 'gold');
        }

        function drawEndScreen(text, color) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = color;
            ctx.font = '48px "Segoe UI"';
            ctx.textAlign = 'center';
            ctx.fillText(text, canvas.width/2, canvas.height/2);
            
            ctx.fillStyle = 'white';
            ctx.font = '24px "Segoe UI"';
            ctx.fillText(`Final Score: ${gameState.player.score}`, canvas.width/2, canvas.height/2 + 50);
            ctx.fillText('Press R to restart game', canvas.width/2, canvas.height/2 + 90);
            
            // Ensure the wave selection menu is initialized for when player returns
            initWaveSelectionMenu();
            
            ctx.textAlign = 'left';
        }

        // Game loop with performance optimization
        let lastTime = 0;
        let frameCount = 0;
        let fpsTimer = 0;
        let gamePaused = true;
        let reducedEffects = false;
        
        function gameLoop(timestamp) {
            // Calculate time since last frame
            if (!lastTime) lastTime = timestamp;
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            
            // FPS monitoring
            frameCount++;
            fpsTimer += deltaTime;
            
            if (fpsTimer > 1000) {
                // If FPS drops below 30, reduce particle effects
                const fps = frameCount / (fpsTimer / 1000);
                if (fps < 30) {
                    // Auto-tune performance settings
                    reducedEffects = true;
                } else {
                    reducedEffects = false;
                }
                
                // Reset FPS counter
                frameCount = 0;
                fpsTimer = 0;
                
                // Periodically clear any potentially stuck keys
                checkForStuckKeys();
            }
            
            // Skip frame if running too slow (prevents spiral of death)
            if (deltaTime > 100) {
                requestAnimationFrame(gameLoop);
                return;
            }
            
            // Process game logic and render
            try {
                if (!gameState.gameOver && !gameState.gameWon && !gamePaused) {
                    updateGame();
                }
                draw();
                
                // Draw the menu when game is not started
                if (!gameState.gameStarted && !gameState.gameOver && !gameState.gameWon) {
                    document.getElementById('waveSelectMenu').style.display = 'flex';
                } else {
                    document.getElementById('waveSelectMenu').style.display = 'none';
                }
            } catch (error) {
                // Error recovery - likely game state corruption
                console.error("Game error:", error);
                gamePaused = true;
                resetKeyboardState(); // Clear keyboard state on error
                // Show recovery UI
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'red';
                ctx.font = '24px "Segoe UI"';
                ctx.textAlign = 'center';
                ctx.fillText('Game Error Detected', canvas.width/2, canvas.height/2 - 40);
                ctx.fillStyle = 'white';
                ctx.fillText('Press R to restart', canvas.width/2, canvas.height/2);
                ctx.textAlign = 'left';
            }
            
            requestAnimationFrame(gameLoop);
        }
        
        // Handle visibility change to pause game when tab is inactive
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                gamePaused = true;
            } else {
                gamePaused = false;
                lastTime = 0; // Reset delta time to prevent huge jumps
            }
        });

        // Check for stuck keys
        function checkForStuckKeys() {
            // Check if player hasn't moved in 3 seconds despite keys being pressed
            const now = Date.now();
            let movementKeysPressed = false;
            
            if (gameState.keys['w'] || gameState.keys['arrowup'] || 
                gameState.keys['s'] || gameState.keys['arrowdown'] ||
                gameState.keys['a'] || gameState.keys['arrowleft'] ||
                gameState.keys['d'] || gameState.keys['arrowright']) {
                movementKeysPressed = true;
            }
            
            // If movement keys are pressed but player position hasn't changed, reset keys
            if (movementKeysPressed && gameState.player.trail.length > 0) {
                const lastPos = gameState.player.trail[gameState.player.trail.length - 1];
                const secondLastPos = gameState.player.trail.length > 1 ? 
                    gameState.player.trail[gameState.player.trail.length - 2] : lastPos;
                    
                if (lastPos.x === secondLastPos.x && lastPos.y === secondLastPos.y) {
                    // Player isn't moving despite keys being pressed - reset keyboard state
                    resetKeyboardState();
                }
            }
        }

        // Start the game with the optimized loop
        requestAnimationFrame(gameLoop);
    </script>
</body>
