<!DOCTYPE html>
<html>
<head>
    <title>Enhanced Space Shooter</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        canvas {
            border: none;
            box-shadow: none;
            border-radius: 0;
            background: linear-gradient(to bottom, #000000, #0a0a2a);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #upgradeMenu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 42, 0.95);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid rgba(88, 161, 247, 0.5);
            box-shadow: 0 0 40px rgba(88, 161, 247, 0.3);
            display: none;
            backdrop-filter: blur(10px);
        }
        .upgrade-button {
            background: linear-gradient(45deg, #1a1a4a, #2a2a6a);
            border: 1px solid rgba(88, 161, 247, 0.5);
            color: #fff;
            padding: 15px;
            margin: 8px;
            cursor: pointer;
            border-radius: 10px;
            width: 220px;
            transition: all 0.3s ease;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(88, 161, 247, 0.5);
        }
        .upgrade-button:hover {
            background: linear-gradient(45deg, #2a2a6a, #3a3a8a);
            box-shadow: 0 0 20px rgba(88, 161, 247, 0.3);
            transform: translateY(-2px);
        }
        #waveSelectMenu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 42, 0.95);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid rgba(88, 161, 247, 0.5);
            box-shadow: 0 0 40px rgba(88, 161, 247, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            backdrop-filter: blur(10px);
            min-width: 400px;
        }
        .wave-button {
            background: linear-gradient(45deg, #1a1a4a, #2a2a6a);
            border: 1px solid rgba(88, 161, 247, 0.5);
            color: #fff;
            padding: 12px;
            margin: 6px;
            cursor: pointer;
            border-radius: 10px;
            width: 120px;
            transition: all 0.3s ease;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(88, 161, 247, 0.5);
        }
        .wave-button:hover {
            background: linear-gradient(45deg, #2a2a6a, #3a3a8a);
            box-shadow: 0 0 20px rgba(88, 161, 247, 0.3);
            transform: translateY(-2px);
        }
        .wave-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .menu-title {
            color: #58A1F7;
            margin-bottom: 20px;
            text-align: center;
        }
        .start-button {
            background: linear-gradient(45deg, #1a4a1a, #2a6a2a);
            border: 1px solid rgba(88, 247, 88, 0.5);
            color: #fff;
            padding: 15px 30px;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-size: 16px;
            text-shadow: 0 0 10px rgba(88, 247, 88, 0.5);
        }
        .start-button:hover {
            background: linear-gradient(45deg, #2a6a2a, #3a8a3a);
            box-shadow: 0 0 20px rgba(88, 247, 88, 0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="upgradeMenu">
        <h2 style="text-align: center; margin-bottom: 20px; color: #58A1F7;">Wave Complete!</h2>
        <div id="upgradeOptions"></div>
    </div>
    <div id="waveSelectMenu">
        <h2 class="menu-title">Select Starting Wave</h2>
        <div class="wave-grid" id="waveButtons"></div>
        <button class="start-button" id="startGameButton">Start Game</button>
    </div>
    <script>
        // Initialize canvas
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas to full screen size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Handle window resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Reset player position when screen resizes
            if (!gameState.gameOver && !gameState.gameWon) {
                gameState.player.x = canvas.width / 2;
                gameState.player.y = canvas.height / 2;
            }
        });

        // Game constants
        const CONSTANTS = {
            PLAYER: {
                BASE_SIZE: 40,
                BASE_SPEED: 5,
                BASE_HEALTH: 100,
                BASE_ENERGY: 100,
                ENERGY_REGEN: 0.4,
                SHOOT_COOLDOWN: 45,
                SHOOT_COST: 20,
                DASH_COOLDOWN: 30,
                DASH_DISTANCE: 100
            },
            BULLET: {
                SIZE: 8,
                SPEED: 10,
                LIFETIME: 60
            },
            POWER_UPS: {
                SIZE: 20,
                SPAWN_CHANCE: 0.003,  // Reduced from 0.01 to 0.003 for less frequent spawns
                DURATION: 300,
                MAX_COUNT: 5  // Maximum number of power-ups allowed at once
            },
            OBSTACLES: {
                SIZE: 200,  // Length of the wall
                THICKNESS: 20,  // Thickness of the wall
                SPAWN_CHANCE: 0.003,
                TYPES: ['WALL', 'CRYSTAL_WALL', 'BARRIER_WALL'],
                DAMAGE: 0,
                MAX_COUNT: 10,  // Maximum number of walls allowed at once
                LIFETIME: 1800,  // 30 seconds at 60fps
                RESPAWN_DELAY: 60  // 1 second delay before respawning
            }
        };

        // Visual constants
        const COLORS = {
            PLAYER: {
                CORE: '#58A1F7',
                GLOW: '#1E90FF',
                TRAIL: 'rgba(88, 161, 247, 0.3)'
            },
            BULLET: {
                CORE: '#FFD700',
                GLOW: '#FFA500'
            },
            POWER_UPS: {
                RAPID_FIRE: '#00FF7F',
                SHIELD: '#1E90FF',
                MULTI_SHOT: '#FF4500',
                SPEED_BOOST: '#FFFF00', 
                HEALTH_RESTORE: '#FF69B4',
                TIME_WARP: '#9932CC'
            },
            OBSTACLES: {
                WALL: {
                    CORE: '#808080',
                    GLOW: '#404040'
                },
                CRYSTAL_WALL: {
                    CORE: '#00FFFF',
                    GLOW: '#008B8B'
                },
                BARRIER_WALL: {
                    CORE: '#FF4500',
                    GLOW: '#8B0000'
                }
            },
            ENEMY: {
                NORMAL: {
                    CORE: '#FF4040',
                    GLOW: '#8B0000'
                },
                FAST: {
                    CORE: '#FF8C00',
                    GLOW: '#D2691E'
                },
                TANK: {
                    CORE: '#8B0000',
                    GLOW: '#4A0000'
                },
                SHOOTER: {
                    CORE: '#9370DB',
                    GLOW: '#483D8B'
                },
                BOMBER: {
                    CORE: '#32CD32',
                    GLOW: '#006400'
                },
                ELITE: {
                    CORE: '#FFD700',
                    GLOW: '#B8860B'
                }
            }
        };

        // Initialize game state
        let gameState = {
            player: {
                x: window.innerWidth / 2,
                y: window.innerHeight / 2,
                speed: CONSTANTS.PLAYER.BASE_SPEED,
                health: CONSTANTS.PLAYER.BASE_HEALTH,
                maxHealth: CONSTANTS.PLAYER.BASE_HEALTH,
                score: 0,
                bullets: [],
                dashCooldown: 0,
                shootCooldown: 0,
                energy: CONSTANTS.PLAYER.BASE_ENERGY,
                maxEnergy: CONSTANTS.PLAYER.BASE_ENERGY,
                trail: [],
                powerUps: [],
                shield: 0,
                multiShot: false,
                level: {
                    damage: 1,
                    speed: 1,
                    health: 1,
                    energy: 1
                }
            },
            enemies: [],
            powerUps: [],
            obstacles: [],
            currentWave: 1,
            wavesTotal: 10,
            enemiesPerWave: 10,
            enemiesDefeated: 0,
            waveComplete: false,
            gameOver: false,
            gameWon: false,
            keys: {},
            mousePos: { x: 0, y: 0 },
            mouseDown: false,
            particles: [],
            enemyBullets: [],
            selectedWave: 1,
            gameStarted: false,
            lastKeyPress: {}
        };

        // Secret code sequence tracking
        let secretCodeBuffer = [];
        let secretCodeTimeout = null;

        // Star field
        const stars = Array(300).fill().map(() => ({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            size: Math.random() * 2,
            speed: 0.1 + Math.random() * 0.5
        }));

        // Initialize wave selection menu
        function initWaveSelectionMenu() {
            const waveButtons = document.getElementById('waveButtons');
            waveButtons.innerHTML = '';
            
            // Create a button for each available wave
            for (let i = 1; i <= gameState.wavesTotal; i++) {
                const button = document.createElement('button');
                button.className = 'wave-button';
                button.textContent = `Wave ${i}`;
                button.dataset.wave = i;
                
                // Highlight the currently selected wave
                if (i === gameState.selectedWave) {
                    button.style.border = '2px solid #58A1F7';
                    button.style.boxShadow = '0 0 15px rgba(88, 161, 247, 0.5)';
                }
                
                button.addEventListener('click', () => {
                    // Update selected wave
                    gameState.selectedWave = i;
                    
                    // Update button styles
                    document.querySelectorAll('.wave-button').forEach(btn => {
                        btn.style.border = '1px solid rgba(88, 161, 247, 0.5)';
                        btn.style.boxShadow = 'none';
                    });
                    
                    button.style.border = '2px solid #58A1F7';
                    button.style.boxShadow = '0 0 15px rgba(88, 161, 247, 0.5)';
                });
                
                waveButtons.appendChild(button);
            }
            
            // Add event listener to start button
            document.getElementById('startGameButton').addEventListener('click', startGameWithSelectedWave);
        }
        
        function startGameWithSelectedWave() {
            // Hide the menu
            document.getElementById('waveSelectMenu').style.display = 'none';
            
            // Set up game state for the selected wave
            gameState.currentWave = gameState.selectedWave;
            gameState.enemiesDefeated = 0;
            gameState.waveComplete = false;
            
            // Adjust difficulty based on wave - make early waves easier
            if (gameState.currentWave <= 3) {
                // Easier early waves (1-3)
                gameState.enemiesPerWave = 8 + (gameState.currentWave - 1) * 1;
            } else {
                // Normal difficulty progression for later waves
                gameState.enemiesPerWave = 10 + (gameState.currentWave - 1) * 2;
            }
            
            // Scale player based on wave (to simulate upgrade progress)
            if (gameState.currentWave > 1) {
                const upgradePoints = gameState.currentWave - 1;
                
                // Distribute upgrade points
                gameState.player.level.damage += upgradePoints * 0.2;
                gameState.player.level.speed += upgradePoints * 0.1;
                gameState.player.maxHealth += upgradePoints * 10;
                gameState.player.health = gameState.player.maxHealth;
                gameState.player.maxEnergy += upgradePoints * 5;
                gameState.player.energy = gameState.player.maxEnergy;
                gameState.player.speed += upgradePoints * 0.2;
            }
            
            // Mark game as started
            gameState.gameStarted = true;
            gamePaused = false;
        }
        
        // Show wave selection menu on load - change to not show by default
        window.addEventListener('load', () => {
            initWaveSelectionMenu();
            
            // Start game immediately at wave 1 instead of showing menu
            gameState.selectedWave = 1;
            gameState.gameStarted = true;
            gamePaused = false;
            document.getElementById('waveSelectMenu').style.display = 'none';
        });

        // Event listeners
        document.addEventListener('keydown', (e) => {
            // Store the key in lowercase to make comparisons case-insensitive
            const key = e.key.toLowerCase();
            
            // Set the key state to true
            gameState.keys[key] = true;
            
            // Track the last time this key was pressed (for detecting stuck keys)
            gameState.lastKeyPress = gameState.lastKeyPress || {};
            gameState.lastKeyPress[key] = Date.now();
            
            // Secret code sequence tracking (Shift+P+/)
            if (secretCodeTimeout) {
                clearTimeout(secretCodeTimeout);
            }
            
            // Add key to sequence buffer
            if (e.shiftKey && key === 'p') {
                secretCodeBuffer.push('shift+p');
            } else if (key === '/') {
                secretCodeBuffer.push('/');
            }
            
            // Check for the full sequence
            if (secretCodeBuffer.length >= 2 && 
                secretCodeBuffer.includes('shift+p') && 
                secretCodeBuffer.includes('/')) {
                // Show wave selection menu and pause game
                gameState.gameStarted = false;
                gamePaused = true;
                document.getElementById('waveSelectMenu').style.display = 'flex';
                initWaveSelectionMenu();
                secretCodeBuffer = []; // Clear buffer after activation
                return;
            }
            
            // Set timeout to clear buffer after 1 second
            secretCodeTimeout = setTimeout(() => {
                secretCodeBuffer = [];
            }, 1000);
            
            // Restart game on 'r' key when game is over
            if (key === 'r' && (gameState.gameOver || gameState.gameWon)) {
                restartGame();
            }
            
            // Dash on space key
            if (key === ' ' && gameState.player.dashCooldown <= 0 && gameState.player.energy >= 30) {
                dash();
            }
        });
        
        document.addEventListener('keyup', (e) => {
            // Store the key in lowercase to make comparisons case-insensitive
            const key = e.key.toLowerCase();
            
            // Set the key state to false
            gameState.keys[key] = false;
            
            // Clear last key press time
            if (gameState.lastKeyPress && gameState.lastKeyPress[key]) {
                delete gameState.lastKeyPress[key];
            }
        });
        
        // Focus event handlers to prevent stuck keys when window loses focus
        window.addEventListener('blur', () => {
            // Clear all key states when window loses focus
            gameState.keys = {};
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            gameState.mousePos.x = e.clientX - rect.left;
            gameState.mousePos.y = e.clientY - rect.top;
        });
        canvas.addEventListener('mousedown', () => gameState.mouseDown = true);
        canvas.addEventListener('mouseup', () => gameState.mouseDown = false);

        // Utility functions
        function createParticle(x, y, color, speed, size, lifetime, glow = false) {
            const angle = Math.random() * Math.PI * 2;
            return {
                x,
                y,
                dx: Math.cos(angle) * speed * (0.5 + Math.random()),
                dy: Math.sin(angle) * speed * (0.5 + Math.random()),
                size: size * (0.5 + Math.random()),
                color,
                glow,
                lifetime: lifetime * (0.8 + Math.random() * 0.4),
                alpha: 1
            };
        }

        function drawGlow(x, y, radius, color) {
            // Skip glow effects for off-screen elements
            if (x < -radius || x > canvas.width + radius || 
                y < -radius || y > canvas.height + radius) {
                return;
            }
            
            // Reduce the quality of glow effects for better performance
            radius = Math.min(radius, 100); // Cap maximum radius
            
            const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
            gradient.addColorStop(0, color);
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(x - radius, y - radius, radius * 2, radius * 2);
        }

        // Game update functions
        function updateGame() {
            if (!gameState.gameOver && !gameState.gameWon) {
                updatePlayer();
                updateBullets();
                updateEnemies();
                updateParticles();
                updatePowerUps();
                updateObstacles();
                checkWaveComplete();
            }
        }

        function updatePlayer() {
            const player = gameState.player;
            
            // Check for stuck keys (pressed more than 5 seconds ago)
            if (gameState.lastKeyPress) {
                const now = Date.now();
                for (const key in gameState.lastKeyPress) {
                    if (now - gameState.lastKeyPress[key] > 5000) {
                        // Clear stuck key
                        gameState.keys[key] = false;
                        delete gameState.lastKeyPress[key];
                    }
                }
            }

            // Decrement cooldowns
            if (player.dashCooldown > 0) player.dashCooldown--;
            
            // Update health restored indicator
            if (gameState.healthRestoredTime > 0) {
                gameState.healthRestoredTime--;
            }
            
            // Apply rapid fire effect to shoot cooldown if active
            if (player.shootCooldown > 0) {
                const cooldownRate = player.rapidFire ? 3 : 1; // Rapid fire reduces cooldown 3x faster
                player.shootCooldown -= cooldownRate;
            }

            // Movement with improved handling
            let moveX = 0, moveY = 0;
            
            // Check for WASD or arrow keys
            if (gameState.keys['w'] || gameState.keys['arrowup']) moveY -= 1;
            if (gameState.keys['s'] || gameState.keys['arrowdown']) moveY += 1;
            if (gameState.keys['a'] || gameState.keys['arrowleft']) moveX -= 1;
            if (gameState.keys['d'] || gameState.keys['arrowright']) moveX += 1;
            
            // Normalize diagonal movement to prevent faster diagonal speed
            if (moveX !== 0 && moveY !== 0) {
                const norm = Math.sqrt(moveX * moveX + moveY * moveY);
                moveX /= norm;
                moveY /= norm;
            }
            
            // Apply movement
            player.x += moveX * player.speed;
            player.y += moveY * player.speed;

            // Keep in bounds
            player.x = Math.max(CONSTANTS.PLAYER.BASE_SIZE, Math.min(canvas.width - CONSTANTS.PLAYER.BASE_SIZE, player.x));
            player.y = Math.max(CONSTANTS.PLAYER.BASE_SIZE, Math.min(canvas.height - CONSTANTS.PLAYER.BASE_SIZE, player.y));

            // Update cooldowns
            if (player.dashCooldown > 0) player.dashCooldown--;
            if (player.shootCooldown > 0) player.shootCooldown--;
            player.energy = Math.min(player.maxEnergy, player.energy + CONSTANTS.PLAYER.ENERGY_REGEN);
            
            // Decay shield
            if (player.shield > 0) {
                player.shield -= 0.1;
            }

            // Trail
            player.trail.push({x: player.x, y: player.y});
            if (player.trail.length > 10) player.trail.shift();

            // Shooting
            if (gameState.mouseDown && player.shootCooldown <= 0 && player.energy >= CONSTANTS.PLAYER.SHOOT_COST) {
                shoot();
            }
        }

        function shoot() {
            const player = gameState.player;
            const angle = Math.atan2(
                gameState.mousePos.y - player.y,
                gameState.mousePos.x - player.x
            );

            if (player.multiShot) {
                // Create multiple bullets
                for (let i = -2; i <= 2; i++) {
                    const spreadAngle = angle + i * 0.1;
                    player.bullets.push({
                        x: player.x,
                        y: player.y,
                        dx: Math.cos(spreadAngle) * CONSTANTS.BULLET.SPEED,
                        dy: Math.sin(spreadAngle) * CONSTANTS.BULLET.SPEED,
                        lifetime: CONSTANTS.BULLET.LIFETIME
                    });
                }
            } else {
                // Create single bullet
                player.bullets.push({
                    x: player.x,
                    y: player.y,
                    dx: Math.cos(angle) * CONSTANTS.BULLET.SPEED,
                    dy: Math.sin(angle) * CONSTANTS.BULLET.SPEED,
                    lifetime: CONSTANTS.BULLET.LIFETIME
                });
            }

            player.shootCooldown = CONSTANTS.PLAYER.SHOOT_COOLDOWN;
            player.energy -= CONSTANTS.PLAYER.SHOOT_COST;

            // Muzzle flash effect
            for (let i = 0; i < 5; i++) {
                gameState.particles.push(createParticle(
                    player.x, player.y,
                    COLORS.BULLET.CORE,
                    3, 4, 15,
                    true
                ));
            }
        }

        function updateBullets() {
            // Limit maximum number of bullets
            if (gameState.player.bullets.length > 50) {
                gameState.player.bullets = gameState.player.bullets.slice(-50);
            }
            
            gameState.player.bullets = gameState.player.bullets.filter(bullet => {
                bullet.x += bullet.dx;
                bullet.y += bullet.dy;
                bullet.lifetime--;

                // Reduce particle generation probability for better performance
                if (Math.random() < 0.1) {
                    gameState.particles.push(createParticle(
                        bullet.x, bullet.y,
                        COLORS.BULLET.GLOW,
                        1, 2, 10,
                        true
                    ));
                }
                
                // Remove bullets that go off-screen
                if (bullet.x < 0 || bullet.x > canvas.width || 
                    bullet.y < 0 || bullet.y > canvas.height) {
                    return false;
                }

                return bullet.lifetime > 0;
            });
        }

        function updateEnemies() {
            // Spawn enemies
            if (!gameState.waveComplete && gameState.enemies.length < 5 && 
                gameState.enemiesDefeated < gameState.enemiesPerWave) {
                if (Math.random() < 0.02) {
                    spawnEnemy();
                }
            }

            // Apply time warp speed reduction if active
            const speedMultiplier = gameState.timeWarpActive ? 0.4 : 1.0; // Reduce enemy speed by 60% during time warp

            // Update existing enemies
            gameState.enemies = gameState.enemies.filter(enemy => {
                const dx = gameState.player.x - enemy.x;
                const dy = gameState.player.y - enemy.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // Movement behavior based on enemy type
                if (enemy.type === 'SHOOTER') {
                    // Initialize shooter properties if not set
                    enemy.bulletCooldown = enemy.bulletCooldown || 0;
                    enemy.bulletCooldown--;

                    // Shooter tries to maintain distance
                    if (dist < 400) {  // Increased from 300
                        // Move away from player if too close
                        enemy.x -= (dx / dist) * enemy.speed * 0.5 * speedMultiplier;
                        enemy.y -= (dy / dist) * enemy.speed * 0.5 * speedMultiplier;
                    } else if (dist > 600) {  // Increased from 400
                        // Move toward player if too far
                        enemy.x += (dx / dist) * enemy.speed * 0.5 * speedMultiplier;
                        enemy.y += (dy / dist) * enemy.speed * 0.5 * speedMultiplier;
                    } else {
                        // Strafe around the player if at good distance
                        const strafeAngle = Math.atan2(dy, dx) + Math.PI / 2;
                        const strafeDirection = Math.sin(Date.now() / 1000) > 0 ? 1 : -1;
                        enemy.x += Math.cos(strafeAngle) * enemy.speed * 0.3 * strafeDirection * speedMultiplier;
                        enemy.y += Math.sin(strafeAngle) * enemy.speed * 0.3 * strafeDirection * speedMultiplier;
                    }

                    // Shoot at player when at good distance and cooldown is ready
                    if (dist >= 400 && dist <= 600 && enemy.bulletCooldown <= 0) {  // Increased range
                        const shootAngle = Math.atan2(dy, dx);
                        gameState.enemyBullets.push({
                            x: enemy.x,
                            y: enemy.y,
                            dx: Math.cos(shootAngle) * 6,  // Increased from 4 to 6
                            dy: Math.sin(shootAngle) * 6,  // Increased from 4 to 6
                            lifetime: 90  // Increased from 60 to 90 to match the longer range
                        });
                        
                        // Create shooting effect
                        for (let i = 0; i < 5; i++) {
                            gameState.particles.push(createParticle(
                                enemy.x, enemy.y,
                                COLORS.ENEMY.SHOOTER.CORE,
                                2, 3, 15,
                                true
                            ));
                        }
                        
                        // Reset cooldown
                        enemy.bulletCooldown = 45; // Shoot every 45 frames (0.75 seconds)
                    }
                } else if (enemy.type === 'BOMBER') {
                    // Bomber approaches and explodes
                    // Update charge timer
                    enemy.chargeTimer--;
                    
                    if (enemy.chargeTimer <= 0) {
                        // Begin charge - pick target point near player
                        enemy.chargeTarget = {
                            x: gameState.player.x + (Math.random() - 0.5) * 200,
                            y: gameState.player.y + (Math.random() - 0.5) * 200
                        };
                        enemy.charging = true;
                        enemy.chargeTimer = 30; // Time to charge
                    }
                    
                    if (enemy.charging) {
                        // Move toward charge target
                        const chargeDx = enemy.chargeTarget.x - enemy.x;
                        const chargeDy = enemy.chargeTarget.y - enemy.y;
                        const chargeDist = Math.sqrt(chargeDx * chargeDx + chargeDy * chargeDy);
                        
                        if (chargeDist > 10) {
                            enemy.x += (chargeDx / chargeDist) * enemy.speed * 2.5 * speedMultiplier;
                            enemy.y += (chargeDy / chargeDist) * enemy.speed * 2.5 * speedMultiplier;
                        } else {
                            // Set up for next charge
                            enemy.charging = false;
                            enemy.chargeTimer = 60; // Cooldown before next charge
                        }
                    } else {
                        // Circle around the player when not charging
                        enemy.angle = (enemy.angle || 0) + 0.02 * speedMultiplier;
                        const orbitDistance = 300;
                        const targetX = gameState.player.x + Math.cos(enemy.angle) * orbitDistance;
                        const targetY = gameState.player.y + Math.sin(enemy.angle) * orbitDistance;
                        
                        const orbitDx = targetX - enemy.x;
                        const orbitDy = targetY - enemy.y;
                        const orbitDist = Math.sqrt(orbitDx * orbitDx + orbitDy * orbitDy);
                        
                        enemy.x += (orbitDx / orbitDist) * enemy.speed * 0.7 * speedMultiplier;
                        enemy.y += (orbitDy / orbitDist) * enemy.speed * 0.7 * speedMultiplier;
                    }
                } else if (enemy.type === 'ELITE') {
                    // Elite enemy - has shields and teleports
                    
                    // Initialize elite properties if not set
                    enemy.shield = enemy.shield || 50;
                    enemy.teleportCooldown = enemy.teleportCooldown || 180;
                    enemy.attackCooldown = enemy.attackCooldown || 120;
                    
                    // Update cooldowns
                    enemy.teleportCooldown--;
                    enemy.attackCooldown--;
                    
                    // Teleport when cooldown reaches zero or when health is low
                    if (enemy.teleportCooldown <= 0 || (enemy.health < enemy.maxHealth * 0.3 && enemy.teleportCooldown <= 60)) {
                        // Create teleport effect at current position
                        createTeleportEffect(enemy.x, enemy.y);
                        
                        // Teleport to a new position near the player
                        const angle = Math.random() * Math.PI * 2;
                        const distance = 200 + Math.random() * 200;
                        enemy.x = gameState.player.x + Math.cos(angle) * distance;
                        enemy.y = gameState.player.y + Math.sin(angle) * distance;
                        
                        // Create teleport effect at new position
                        createTeleportEffect(enemy.x, enemy.y);
                        
                        // Reset teleport cooldown
                        enemy.teleportCooldown = 180;
                    }
                    
                    // Special attack - shoot multiple bullets in a pattern
                    if (enemy.attackCooldown <= 0 && dist < 500) {
                        // Spiral attack
                        const bulletCount = 8;
                        for (let i = 0; i < bulletCount; i++) {
                            const spreadAngle = Math.atan2(dy, dx) + (Math.PI * 2 * i / bulletCount);
                            
                            gameState.enemyBullets.push({
                                x: enemy.x,
                                y: enemy.y,
                                dx: Math.cos(spreadAngle) * 4,
                                dy: Math.sin(spreadAngle) * 4,
                                lifetime: 60,
                                fromElite: true
                            });
                        }
                        
                        // Create attack effect
                        for (let i = 0; i < 10; i++) {
                            gameState.particles.push(createParticle(
                                enemy.x, enemy.y,
                                COLORS.ENEMY.ELITE.CORE,
                                3, 5, 15,
                                true
                            ));
                        }
                        
                        // Reset attack cooldown
                        enemy.attackCooldown = 120;
                    }
                    
                    // Move toward player at variable speed
                    const moveSpeed = enemy.speed * (0.5 + Math.sin(Date.now() / 1000) * 0.3) * speedMultiplier;
                    
                    // Enemy pathfinding
                    if (Math.random() < 0.01) {
                        // Occasional randomness to movement
                        enemy.randomDir = {
                            x: Math.random() * 2 - 1,
                            y: Math.random() * 2 - 1
                        };
                    }
                    
                    // Blend direct path to player with some randomness
                    const randomFactor = 0.2;
                    enemy.x += ((dx / dist) * (1 - randomFactor) + (enemy.randomDir ? enemy.randomDir.x : 0) * randomFactor) * enemy.speed * speedMultiplier;
                    enemy.y += ((dy / dist) * (1 - randomFactor) + (enemy.randomDir ? enemy.randomDir.y : 0) * randomFactor) * enemy.speed * speedMultiplier;
                    
                    // Create movement trail
                    if (Math.random() < 0.05) {
                        gameState.particles.push(createParticle(
                            enemy.x, enemy.y,
                            enemy.color || 'red',
                            1, 
                            enemy.size * 0.3,
                            20
                        ));
                    }
                } else {
                    // Basic enemy AI - approach player
                    // Calculate movement based on player position
                    const moveSpeed = enemy.speed * (0.5 + Math.sin(Date.now() / 1000) * 0.3) * speedMultiplier;
                    
                    // Enemy pathfinding
                    if (Math.random() < 0.01) {
                        // Occasional randomness to movement
                        enemy.randomDir = {
                            x: Math.random() * 2 - 1,
                            y: Math.random() * 2 - 1
                        };
                    }
                    
                    // Blend direct path to player with some randomness
                    const randomFactor = 0.2;
                    enemy.x += ((dx / dist) * (1 - randomFactor) + (enemy.randomDir ? enemy.randomDir.x : 0) * randomFactor) * enemy.speed * speedMultiplier;
                    enemy.y += ((dy / dist) * (1 - randomFactor) + (enemy.randomDir ? enemy.randomDir.y : 0) * randomFactor) * enemy.speed * speedMultiplier;
                    
                    // Create movement trail
                    if (Math.random() < 0.05) {
                        gameState.particles.push(createParticle(
                            enemy.x, enemy.y,
                            enemy.color || 'red',
                            1, 
                            enemy.size * 0.3,
                            20
                        ));
                    }
                }

                // Reduce particle generation probability for better performance
                if (Math.random() < 0.05) {
                    gameState.particles.push(createParticle(
                        enemy.x, enemy.y,
                        enemy.color || 'red',
                        1, 
                        enemy.size * 0.3,
                        20
                    ));
                }

                // Check collisions
                return !checkEnemyCollisions(enemy, dist);
            });
            
            // Update enemy bullets if they exist
            if (gameState.enemyBullets) {
                gameState.enemyBullets = gameState.enemyBullets.filter(bullet => {
                    bullet.x += bullet.dx;
                    bullet.y += bullet.dy;
                    bullet.lifetime--;
                    
                    // Check collision with player
                    const dx = gameState.player.x - bullet.x;
                    const dy = gameState.player.y - bullet.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < CONSTANTS.PLAYER.BASE_SIZE) {
                        // If shield is active, reduce shield instead of health
                        if (gameState.player.shield > 0) {
                            gameState.player.shield -= 20;
                            if (gameState.player.shield < 0) gameState.player.shield = 0;
                        } else {
                            gameState.player.health -= 5;
                            
                            // Check for game over
                            if (gameState.player.health <= 0) {
                                gameState.gameOver = true;
                            }
                        }
                        
                        // Create hit effect
                        createExplosion(bullet.x, bullet.y, '#FFA500');
                        return false;
                    }
                    
                    // Remove if off-screen or expired
                    if (bullet.x < 0 || bullet.x > canvas.width || 
                        bullet.y < 0 || bullet.y > canvas.height || 
                        bullet.lifetime <= 0) {
                        return false;
                    }
                    
                    return true;
                });
            }
        }

        function checkEnemyCollisions(enemy, dist) {
            // Check collision with player
            if (dist < CONSTANTS.PLAYER.BASE_SIZE + enemy.size * 0.5) {
                // If shield is active, reduce shield instead of health
                if (gameState.player.shield > 0) {
                    gameState.player.shield -= 50;
                    if (gameState.player.shield < 0) gameState.player.shield = 0;
                } else {
                    // Different damage based on enemy type
                    let damage = 10;
                    if (enemy.type === 'FAST') damage = 7;
                    if (enemy.type === 'TANK') damage = 15;
                    if (enemy.type === 'SHOOTER') damage = 8;
                    if (enemy.type === 'BOMBER') damage = 12;
                    if (enemy.type === 'ELITE') damage = 14;
                    
                    // Reduce damage for early waves
                    if (gameState.currentWave <= 3) {
                        damage = Math.round(damage * 0.7);
                    }
                    
                    gameState.player.health -= damage;
                    
                    // Check for game over
                    if (gameState.player.health <= 0) {
                        gameState.gameOver = true;
                    }
                }
                
                // Special effect for elite collision
                if (enemy.type === 'ELITE') {
                    // Teleport away after collision
                    createTeleportEffect(enemy.x, enemy.y);
                    
                    // Teleport to a random position close to player
                    const angle = Math.random() * Math.PI * 2;
                    const distance = 300 + Math.random() * 100;
                    enemy.x = gameState.player.x + Math.cos(angle) * distance;
                    enemy.y = gameState.player.y + Math.sin(angle) * distance;
                    
                    createTeleportEffect(enemy.x, enemy.y);
                    
                    // Don't destroy elite on collision
                    return false;
                } 
                // Bomber explodes on collision
                else if (enemy.type === 'BOMBER') {
                    explodeBomber(enemy);
                    return true;
                }
                // Normal explosion for other enemy types
                else {
                    createExplosion(enemy.x, enemy.y, COLORS.ENEMY[enemy.type].CORE);
                    return true;
                }
            }

            // Check collision with bullets
            for (let i = gameState.player.bullets.length - 1; i >= 0; i--) {
                const bullet = gameState.player.bullets[i];
                const bulletDist = Math.sqrt(
                    (bullet.x - enemy.x) * (bullet.x - enemy.x) +
                    (bullet.y - enemy.y) * (bullet.y - enemy.y)
                );

                if (bulletDist < CONSTANTS.BULLET.SIZE + enemy.size) {
                    // Apply damage based on player's damage level and enemy type
                    let baseDamage = 40; // Increased base damage
                    let damageMultiplier = gameState.player.level.damage;
                    
                    // Damage adjustment for different enemy types
                    if (enemy.type === 'FAST') baseDamage *= 1.2; // Fast enemies take more damage
                    if (enemy.type === 'TANK') baseDamage *= 0.7; // Tank enemies take less damage
                    if (enemy.type === 'ELITE') {
                        // Elite enemies have shield that absorbs damage first
                        if (enemy.shield > 0) {
                            enemy.shield -= baseDamage * damageMultiplier * 0.5;
                            // Create shield hit effect
                            for (let j = 0; j < 5; j++) {
                                gameState.particles.push(createParticle(
                                    bullet.x, bullet.y,
                                    COLORS.ENEMY.ELITE.GLOW,
                                    2, 3, 15,
                                    true
                                ));
                            }
                            gameState.player.bullets.splice(i, 1);
                            // If shield is depleted, continue to damage health
                            if (enemy.shield <= 0) {
                                enemy.shield = 0;
                                enemy.health -= baseDamage * damageMultiplier * 0.5;
                            } else {
                                // Shield absorbed all damage
                                continue;
                            }
                        } else {
                            enemy.health -= baseDamage * damageMultiplier * 0.8; // Elite takes less damage
                        }
                    } else {
                        enemy.health -= baseDamage * damageMultiplier;
                    }
                    
                    gameState.player.bullets.splice(i, 1);

                    if (enemy.health <= 0) {
                        // Score based on enemy type
                        let scoreValue = 100;
                        if (enemy.type === 'FAST') scoreValue = 150;
                        if (enemy.type === 'TANK') scoreValue = 200;
                        if (enemy.type === 'SHOOTER') scoreValue = 250;
                        if (enemy.type === 'BOMBER') scoreValue = 100;
                        if (enemy.type === 'ELITE') scoreValue = 300;
                        
                        gameState.player.score += scoreValue;
                        gameState.enemiesDefeated++;
                        
                        // Special death effect for bomber
                        if (enemy.type === 'BOMBER') {
                            explodeBomber(enemy);
                        } 
                        // Special death effect for elite
                        else if (enemy.type === 'ELITE') {
                            // More impressive explosion for elite
                            for (let i = 0; i < 3; i++) {
                                setTimeout(() => {
                                    createExplosion(
                                        enemy.x + (Math.random() * 50 - 25),
                                        enemy.y + (Math.random() * 50 - 25),
                                        COLORS.ENEMY.ELITE.CORE
                                    );
                                }, i * 100);
                            }
                        }
                        // Normal explosion for other types
                        else {
                            createExplosion(enemy.x, enemy.y, COLORS.ENEMY[enemy.type].CORE);
                        }
                        return true;
                    }
                }
            }

            return false;
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 20; i++) {
                gameState.particles.push(createParticle(
                    x, y,
                    color,
                    4 + Math.random() * 2,
                    3 + Math.random() * 2,
                    30,
                    true
                ));
            }
        }

        function updateParticles() {
            // More aggressive particle management - this is often a major cause of slowdown
            // Limit the number of particles based on how many enemies are on screen
            const maxParticles = 100 + Math.min(gameState.enemies.length * 20, 100);
            if (gameState.particles.length > maxParticles) {
                // Keep newest particles which are usually more relevant
                gameState.particles = gameState.particles.slice(-maxParticles);
            }
            
            gameState.particles = gameState.particles.filter(particle => {
                particle.x += particle.dx;
                particle.y += particle.dy;
                particle.lifetime--;
                particle.alpha = particle.lifetime / 30;
                
                // Remove particles that go off-screen to save processing
                if (particle.x < 0 || particle.x > canvas.width || 
                    particle.y < 0 || particle.y > canvas.height) {
                    return false;
                }
                
                return particle.lifetime > 0;
            });
            
            // Update shockwaves if they exist
            if (gameState.shockwaves && gameState.shockwaves.length > 0) {
                gameState.shockwaves = gameState.shockwaves.filter(shockwave => {
                    shockwave.radius += (shockwave.maxRadius - shockwave.radius) * 0.2;
                    shockwave.lifetime--;
                    return shockwave.lifetime > 0;
                });
            }
        }

        function updatePowerUps() {
            // Spawn power-ups
            if (Math.random() < CONSTANTS.POWER_UPS.SPAWN_CHANCE && gameState.powerUps.length < CONSTANTS.POWER_UPS.MAX_COUNT) {
                // Expanded list of power-up types with equal probability
                const powerUpTypes = ['shield', 'multiShot', 'speedBoost', 'rapidFire', 'healthRestore', 'timeWarp'];
                const powerUpType = powerUpTypes[Math.floor(Math.random() * powerUpTypes.length)];
                
                gameState.powerUps.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: Math.random() * (canvas.height - 40) + 20,
                    type: powerUpType,
                    duration: 300
                });
            }

            // Update existing power-ups
            gameState.powerUps = gameState.powerUps.filter(powerUp => {
                // Safety check for invalid power-ups
                if (!powerUp || !powerUp.type) return false;
                
                try {
                    const dx = gameState.player.x - powerUp.x;
                    const dy = gameState.player.y - powerUp.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < CONSTANTS.PLAYER.BASE_SIZE + 20) {
                        // Handle different power-up effects
                        switch(powerUp.type) {
                            case 'shield':
                                gameState.player.shield = 100;
                                break;
                            case 'multiShot':
                                gameState.player.multiShot = true;
                                setTimeout(() => {
                                    gameState.player.multiShot = false;
                                }, 5000);
                                break;
                            case 'speedBoost':
                                // Reset to base speed first to prevent stacking
                                gameState.player.speed = CONSTANTS.PLAYER.BASE_SPEED;
                                // Apply new boost
                                gameState.player.speed *= 1.5;
                                gameState.player.speedBoostActive = true;
                                setTimeout(() => {
                                    gameState.player.speed = CONSTANTS.PLAYER.BASE_SPEED;
                                    gameState.player.speedBoostActive = false;
                                }, 7000);
                                break;
                            case 'rapidFire':
                                gameState.player.rapidFire = true;
                                setTimeout(() => {
                                    gameState.player.rapidFire = false;
                                }, 6000);
                                break;
                            case 'healthRestore':
                                // Fix the health restore power-up by ensuring it actually adds health
                                const healAmount = gameState.player.maxHealth * 0.3;
                                gameState.player.health = Math.min(
                                    gameState.player.maxHealth,
                                    gameState.player.health + healAmount
                                );
                                // Add visual confirmation of healing
                                for (let i = 0; i < 20; i++) {
                                    gameState.particles.push(createParticle(
                                        gameState.player.x, gameState.player.y,
                                        COLORS.POWER_UPS.HEALTH_RESTORE,
                                        3, 5, 30,
                                        true
                                    ));
                                }
                                // Add a temporary health restored indicator
                                gameState.healthRestoredTime = 120; // Show for 2 seconds (60 frames per second)
                                break;
                            case 'timeWarp':
                                // Apply time warp effect to slow down enemies
                                gameState.timeWarpActive = true;
                                setTimeout(() => {
                                    gameState.timeWarpActive = false;
                                }, 5000);
                                break;
                        }
                        
                        // Create visual explosion effect for power-up collection
                        let colorKey;
                        switch(powerUp.type) {
                            case 'shield': colorKey = 'SHIELD'; break;
                            case 'multiShot': colorKey = 'MULTI_SHOT'; break;
                            case 'speedBoost': colorKey = 'SPEED_BOOST'; break;
                            case 'rapidFire': colorKey = 'RAPID_FIRE'; break;
                            case 'healthRestore': colorKey = 'HEALTH_RESTORE'; break;
                            case 'timeWarp': colorKey = 'TIME_WARP'; break;
                            default: colorKey = 'SHIELD'; // Fallback color
                        }
                        createExplosion(powerUp.x, powerUp.y, COLORS.POWER_UPS[colorKey]);
                        return false;
                    }
                    return true;
                } catch (e) {
                    // If there's an error with this power-up, remove it
                    console.log("Power-up error:", e);
                    return false;
                }
            });
        }

        function dash() {
            const player = gameState.player;
            // Calculate direction based on WASD keys
            let dx = 0, dy = 0;
            
            // Check for WASD or arrow keys
            if (gameState.keys['w'] || gameState.keys['arrowup']) dy = -1;
            if (gameState.keys['s'] || gameState.keys['arrowdown']) dy = 1;
            if (gameState.keys['a'] || gameState.keys['arrowleft']) dx = -1;
            if (gameState.keys['d'] || gameState.keys['arrowright']) dx = 1;
            
            // Normalize if moving diagonally
            if (dx !== 0 && dy !== 0) {
                const norm = Math.sqrt(dx * dx + dy * dy);
                dx /= norm;
                dy /= norm;
            }
            
            // If no direction keys pressed, dash toward mouse
            if (dx === 0 && dy === 0) {
                const angle = Math.atan2(
                    gameState.mousePos.y - player.y,
                    gameState.mousePos.x - player.x
                );
                dx = Math.cos(angle);
                dy = Math.sin(angle);
            }
            
            // Apply dash
            player.x += dx * CONSTANTS.PLAYER.DASH_DISTANCE;
            player.y += dy * CONSTANTS.PLAYER.DASH_DISTANCE;
            
            // Keep in bounds
            player.x = Math.max(CONSTANTS.PLAYER.BASE_SIZE, Math.min(canvas.width - CONSTANTS.PLAYER.BASE_SIZE, player.x));
            player.y = Math.max(CONSTANTS.PLAYER.BASE_SIZE, Math.min(canvas.height - CONSTANTS.PLAYER.BASE_SIZE, player.y));
            
            // Set cooldown and energy cost
            player.dashCooldown = CONSTANTS.PLAYER.DASH_COOLDOWN;
            player.energy -= 30;
            
            // Create dash effect
            for (let i = 0; i < 15; i++) {
                gameState.particles.push(createParticle(
                    player.x, player.y,
                    COLORS.PLAYER.CORE,
                    3, 4, 20,
                    true
                ));
            }
        }
        
        function checkWaveComplete() {
            if (!gameState.waveComplete && gameState.enemiesDefeated >= gameState.enemiesPerWave) {
                gameState.waveComplete = true;
                
                // Add a slight delay before showing the menu to prevent UI issues
                setTimeout(() => {
                    // Check if all waves completed
                    if (gameState.currentWave >= gameState.wavesTotal) {
                        gameState.gameWon = true;
                    } else {
                        // Show upgrade menu and pause the game
                        gamePaused = true;
                        showUpgradeMenu();
                    }
                }, 500);
            }
        }
        
        function showUpgradeMenu() {
            const upgradeMenu = document.getElementById('upgradeMenu');
            const upgradeOptions = document.getElementById('upgradeOptions');
            
            // Make sure we're not already showing the menu
            if (upgradeMenu.style.display === 'block') {
                return;
            }
            
            // Clear previous options
            upgradeOptions.innerHTML = '';
            
            // Create upgrade buttons
            const upgrades = [
                { name: 'Increase Damage', effect: () => { gameState.player.level.damage += 0.5; } },
                { name: 'Increase Speed', effect: () => { gameState.player.speed += 1; } },
                { name: 'Increase Health', effect: () => { 
                    gameState.player.maxHealth += 25; 
                    gameState.player.health = gameState.player.maxHealth;
                }},
                { name: 'Increase Energy', effect: () => { 
                    gameState.player.maxEnergy += 25; 
                    gameState.player.energy = gameState.player.maxEnergy;
                }}
            ];
            
            upgrades.forEach(upgrade => {
                const button = document.createElement('button');
                button.className = 'upgrade-button';
                button.textContent = upgrade.name;
                button.onclick = () => {
                    upgrade.effect();
                    closeUpgradeMenu();
                    startNextWave();
                };
                upgradeOptions.appendChild(button);
            });
            
            // Add "No Upgrades" button
            const noUpgradeButton = document.createElement('button');
            noUpgradeButton.className = 'upgrade-button';
            noUpgradeButton.style.background = 'linear-gradient(45deg, #4a1a1a, #6a2a2a)';
            noUpgradeButton.style.borderColor = 'rgba(247, 88, 88, 0.5)';
            noUpgradeButton.textContent = 'No Upgrades';
            noUpgradeButton.onclick = () => {
                closeUpgradeMenu();
                startNextWave();
            };
            upgradeOptions.appendChild(noUpgradeButton);
            
            // Show menu
            upgradeMenu.style.display = 'block';
        }
        
        function closeUpgradeMenu() {
            document.getElementById('upgradeMenu').style.display = 'none';
            // Resume the game after upgrade is selected
            gamePaused = false;
        }
        
        function startNextWave() {
            gameState.currentWave++;
            gameState.enemiesDefeated = 0;
            gameState.waveComplete = false;
            
            // Increase difficulty
            gameState.enemiesPerWave += 5;
            
            // Clear any existing enemies to ensure clean wave transition
            gameState.enemies = [];
        }
        
        function restartGame() {
            // Reset game state
            gameState = {
                player: {
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    speed: CONSTANTS.PLAYER.BASE_SPEED,
                    health: CONSTANTS.PLAYER.BASE_HEALTH,
                    maxHealth: CONSTANTS.PLAYER.BASE_HEALTH,
                    score: 0,
                    bullets: [],
                    dashCooldown: 0,
                    shootCooldown: 0,
                    energy: CONSTANTS.PLAYER.BASE_ENERGY,
                    maxEnergy: CONSTANTS.PLAYER.BASE_ENERGY,
                    trail: [],
                    powerUps: [],
                    shield: 0,
                    multiShot: false,
                    level: {
                        damage: 1,
                        speed: 1,
                        health: 1,
                        energy: 1
                    }
                },
                enemies: [],
                powerUps: [],
                obstacles: [],
                currentWave: 1,
                wavesTotal: 10,
                enemiesPerWave: 10,
                enemiesDefeated: 0,
                waveComplete: false,
                gameOver: false,
                gameWon: false,
                particles: [],
                shockwaves: [],
                keys: {},
